# Vitrail config
# x, y, width, height are percentages of the usable screen area
# title is optional — used to distinguish windows from the same app (e.g. Chrome profiles)

[[layout]]
name = "perso"
hotkey = "alt+1"

  [[layout.window]]
  app = "cmux"
  x = 0
  y = 0
  width = 40
  height = 60

  [[layout.window]]
  app = "Music"
  x = 0
  y = 60
  width = 40
  height = 40

  [[layout.window]]
  app = "Google Chrome"
  title = "Profile 1"
  x = 40
  y = 0
  width = 60
  height = 100

[[layout]]
name = "work"
hotkey = "alt+2"

  [[layout.window]]
  app = "Terminal"
  x = 0
  y = 0
  width = 50
  height = 100

  [[layout.window]]
  app = "Google Chrome"
  title = "Work"
  x = 50
  y = 0
  width = 50
  height = 100
